<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 680" role="img" aria-labelledby="title desc">
  <title id="title">串联谐振有源双桥拓扑重绘图</title>
  <desc id="desc">A侧铅酸端口通过左侧有源桥、串联谐振网络和隔离变压器连接到右侧有源桥与B侧锂电端口。</desc>
  <defs>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0d7d5d"/>
    </marker>
    <marker id="arrow-amber" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f0a928"/>
    </marker>
    <style>
      .bg { fill: #fbfdfc; }
      .panel { fill: #ffffff; stroke: #d9e0e4; stroke-width: 2; }
      .bus { stroke: #172026; stroke-width: 5; stroke-linecap: round; }
      .wire { stroke: #172026; stroke-width: 3; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .thin { stroke: #5d6b75; stroke-width: 2; fill: none; }
      .switch { fill: #ffffff; stroke: #172026; stroke-width: 3; }
      .body { fill: #edf8f4; stroke: #0d7d5d; stroke-width: 2; }
      .res { fill: #fff7e8; stroke: #f0a928; stroke-width: 2; }
      .label { fill: #172026; font-family: "Microsoft YaHei", "Segoe UI", Arial, sans-serif; font-size: 22px; font-weight: 700; }
      .small { fill: #5d6b75; font-family: "Microsoft YaHei", "Segoe UI", Arial, sans-serif; font-size: 17px; }
      .tiny { fill: #5d6b75; font-family: "Microsoft YaHei", "Segoe UI", Arial, sans-serif; font-size: 14px; }
      .flow-a { stroke: #0d7d5d; stroke-width: 5; fill: none; marker-end: url(#arrow-green); stroke-linecap: round; }
      .flow-b { stroke: #f0a928; stroke-width: 5; fill: none; marker-end: url(#arrow-amber); stroke-linecap: round; stroke-dasharray: 11 9; }
    </style>
  </defs>

  <rect class="bg" width="1180" height="680" rx="18"/>
  <rect class="panel" x="36" y="42" width="1108" height="596" rx="14"/>

  <text class="label" x="64" y="86">A侧端口：10V-15V 铅酸电池范围</text>
  <text class="label" x="770" y="86">B侧端口：3.0V-4.2V 锂电范围</text>
  <text class="tiny" x="438" y="118">控制量：主移相、左桥内移相、右桥内移相、频率</text>

  <line class="bus" x1="110" y1="142" x2="110" y2="446"/>
  <line class="bus" x1="248" y1="142" x2="248" y2="446"/>
  <line class="bus" x1="932" y1="142" x2="932" y2="446"/>
  <line class="bus" x1="1070" y1="142" x2="1070" y2="446"/>

  <text class="label" x="66" y="185">a</text>
  <text class="label" x="64" y="425">a'</text>
  <text class="label" x="1090" y="185">b</text>
  <text class="label" x="1087" y="425">b'</text>

  <rect class="body" x="70" y="242" width="62" height="82" rx="8"/>
  <text class="small" x="82" y="276">BT1</text>
  <text class="tiny" x="79" y="300">12V</text>
  <rect class="body" x="1048" y="242" width="62" height="82" rx="8"/>
  <text class="small" x="1060" y="276">BT2</text>
  <text class="tiny" x="1058" y="300">3.6V</text>

  <rect class="res" x="65" y="350" width="70" height="44" rx="6"/>
  <text class="small" x="80" y="378">RL1</text>
  <rect class="res" x="1043" y="350" width="70" height="44" rx="6"/>
  <text class="small" x="1058" y="378">RL2</text>

  <line class="wire" x1="110" y1="168" x2="190" y2="168"/>
  <line class="wire" x1="110" y1="420" x2="190" y2="420"/>
  <line class="wire" x1="990" y1="168" x2="1070" y2="168"/>
  <line class="wire" x1="990" y1="420" x2="1070" y2="420"/>

  <rect class="panel" x="188" y="112" width="126" height="364" rx="10"/>
  <text class="label" x="203" y="140">左有源桥</text>
  <rect class="switch" x="220" y="168" width="34" height="52" rx="6"/>
  <rect class="switch" x="220" y="368" width="34" height="52" rx="6"/>
  <rect class="switch" x="260" y="168" width="34" height="52" rx="6"/>
  <rect class="switch" x="260" y="368" width="34" height="52" rx="6"/>
  <text class="tiny" x="219" y="160">A桥臂</text>
  <text class="tiny" x="261" y="160">B桥臂</text>
  <line class="wire" x1="237" y1="220" x2="237" y2="368"/>
  <line class="wire" x1="277" y1="220" x2="277" y2="368"/>
  <line class="wire" x1="237" y1="294" x2="340" y2="294"/>
  <line class="wire" x1="277" y1="318" x2="340" y2="318"/>

  <rect class="panel" x="866" y="112" width="126" height="364" rx="10"/>
  <text class="label" x="881" y="140">右有源桥</text>
  <rect class="switch" x="892" y="168" width="34" height="52" rx="6"/>
  <rect class="switch" x="892" y="368" width="34" height="52" rx="6"/>
  <rect class="switch" x="932" y="168" width="34" height="52" rx="6"/>
  <rect class="switch" x="932" y="368" width="34" height="52" rx="6"/>
  <text class="tiny" x="890" y="160">C桥臂</text>
  <text class="tiny" x="932" y="160">D桥臂</text>
  <line class="wire" x1="909" y1="220" x2="909" y2="368"/>
  <line class="wire" x1="949" y1="220" x2="949" y2="368"/>
  <line class="wire" x1="840" y1="294" x2="909" y2="294"/>
  <line class="wire" x1="840" y1="318" x2="949" y2="318"/>

  <line class="wire" x1="340" y1="294" x2="382" y2="294"/>
  <path class="wire" d="M382 294 h18 c10 0 10 -24 20 -24 s10 24 20 24 s10 -24 20 -24 s10 24 20 24 h18"/>
  <text class="small" x="425" y="252">Lr</text>

  <line class="wire" x1="498" y1="294" x2="530" y2="294"/>
  <line class="wire" x1="530" y1="270" x2="530" y2="318"/>
  <line class="wire" x1="552" y1="270" x2="552" y2="318"/>
  <line class="wire" x1="552" y1="294" x2="590" y2="294"/>
  <text class="small" x="523" y="252">Cr</text>

  <line class="wire" x1="340" y1="318" x2="590" y2="318"/>

  <rect class="panel" x="590" y="214" width="250" height="164" rx="10"/>
  <path class="thin" d="M644 248 c34 20 34 74 0 94"/>
  <path class="thin" d="M668 248 c34 20 34 74 0 94"/>
  <path class="thin" d="M770 248 c-34 20 -34 74 0 94"/>
  <path class="thin" d="M746 248 c-34 20 -34 74 0 94"/>
  <line class="thin" x1="708" y1="235" x2="708" y2="354"/>
  <line class="thin" x1="722" y1="235" x2="722" y2="354"/>
  <text class="label" x="636" y="205">高频隔离变压器</text>
  <text class="tiny" x="671" y="400">变比匹配 + 电气隔离</text>
  <line class="wire" x1="590" y1="294" x2="644" y2="294"/>
  <line class="wire" x1="590" y1="318" x2="644" y2="318"/>
  <line class="wire" x1="770" y1="294" x2="840" y2="294"/>
  <line class="wire" x1="770" y1="318" x2="840" y2="318"/>

  <path class="flow-b" d="M990 510 C 760 480, 405 480, 195 510"/>
  <text class="small" x="392" y="462">B侧向A侧：发挥一/二，BT2 反向供能</text>
  <path class="flow-a" d="M190 548 C 380 608, 730 608, 984 548"/>
  <text class="small" x="392" y="620">A侧向B侧：基本要求，BT1 给 B侧充电</text>

  <text class="small" x="328" y="150">HRTIM A/B：互补 PWM</text>
  <text class="small" x="720" y="150">HRTIM C/D：互补 PWM</text>
  <text class="tiny" x="392" y="356">Lr-Cr 串联谐振腔：限制电流并支持软开关</text>
</svg>
