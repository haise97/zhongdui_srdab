<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1240 760" role="img" aria-labelledby="title desc">
  <title id="title">DAB 移相调制的文献化概念示意</title>
  <desc id="desc">用 DAB 文献常见的两侧全桥交流端电压、外移相、桥内移相和电感电流解释 SPS、EPS、DPS、TPS、VFM 的控制自由度。</desc>
  <defs>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0 L10 5 L0 10Z" fill="#4da146"/>
    </marker>
    <marker id="arrow-rose" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0 L10 5 L0 10Z" fill="#e97f9a"/>
    </marker>
    <style>
      .bg{fill:#fbfff9}
      .box{fill:#fff;stroke:#b9dfb6;stroke-width:2}
      .soft{fill:#f3fbf1;stroke:#c9e8c5;stroke-width:1.6}
      .warn{fill:#fff8e6;stroke:#efc66c;stroke-width:1.6}
      .axis{stroke:#b5d4b4;stroke-width:1.7}
      .tick{stroke:#dcebd9;stroke-width:1.2}
      .primary{stroke:#23823b;stroke-width:5;fill:none;stroke-linejoin:round}
      .secondary{stroke:#d89416;stroke-width:5;fill:none;stroke-linejoin:round}
      .current{stroke:#3aa7b4;stroke-width:4.5;fill:none}
      .outline{stroke:#7ac66f;stroke-width:3;fill:none;stroke-dasharray:9 7}
      .label{fill:#17331f;font:800 22px 'Microsoft YaHei',Arial}
      .title2{fill:#17331f;font:800 18px 'Microsoft YaHei',Arial}
      .sub{fill:#66806b;font:16px 'Microsoft YaHei',Arial}
      .small{fill:#55715d;font:15px 'Microsoft YaHei',Arial}
      .tiny{fill:#66806b;font:13px 'Microsoft YaHei',Arial}
      .mark{stroke:#e97f9a;stroke-width:2;stroke-dasharray:7 7}
      .guide{stroke:#4da146;stroke-width:3;marker-end:url(#arrow-green)}
      .guide-rose{stroke:#e97f9a;stroke-width:3;marker-end:url(#arrow-rose)}
      .tag{fill:#e8f8e1;stroke:#b9dfb6;stroke-width:1.4}
      .tag2{fill:#fff7e3;stroke:#f0c76f;stroke-width:1.4}
    </style>
  </defs>

  <rect class="bg" width="1240" height="760" rx="24"/>
  <rect class="box" x="34" y="30" width="1172" height="674" rx="22"/>

  <text class="label" x="62" y="72">DAB/SR-DAB 移相调制的正确阅读方式</text>
  <text class="sub" x="62" y="104">先看两侧全桥交流端电压，再看相移自由度。下图是概念示意，不表示真实门极死区、器件编号或精确电流波形。</text>

  <rect class="warn" x="62" y="126" width="1116" height="70" rx="16"/>
  <text class="title2" x="86" y="158">符号约定</text>
  <text class="small" x="190" y="158">左桥交流端电压记为 v11，由拓扑中的 A、B 两桥臂合成；右桥交流端电压记为 v22，由 C、D 两桥臂合成。</text>
  <text class="small" x="190" y="182">φ 表示两侧全桥输出之间的外移相；D1、D2 表示两侧全桥内部相移带来的等效脉宽自由度。</text>

  <rect class="soft" x="62" y="226" width="530" height="310" rx="18"/>
  <rect class="soft" x="648" y="226" width="530" height="310" rx="18"/>
  <text class="label" x="88" y="266">SPS：单移相</text>
  <text class="label" x="674" y="266">TPS：三重移相</text>
  <text class="small" x="88" y="292">两侧全桥均输出固定 50% 方波，只调外移相 φ。</text>
  <text class="small" x="674" y="292">外移相 φ、左桥内移相 D1、右桥内移相 D2 都可独立调。</text>

  <g id="sps">
    <line class="axis" x1="166" y1="350" x2="562" y2="350"/>
    <line class="axis" x1="166" y1="412" x2="562" y2="412"/>
    <line class="axis" x1="166" y1="474" x2="562" y2="474"/>
    <line class="tick" x1="230" y1="324" x2="230" y2="492"/>
    <line class="tick" x1="314" y1="324" x2="314" y2="492"/>
    <line class="tick" x1="398" y1="324" x2="398" y2="492"/>
    <line class="tick" x1="482" y1="324" x2="482" y2="492"/>
    <text class="title2" x="88" y="356">v11</text>
    <text class="title2" x="88" y="418">v22</text>
    <text class="title2" x="88" y="480">iL</text>
    <path class="primary" d="M174 324 H272 V376 H370 V324 H468 V376 H558"/>
    <path class="secondary" d="M174 438 H314 V386 H412 V438 H510 V386 H558"/>
    <path class="current" d="M174 474 C220 432 268 432 314 474 S406 516 452 474 S520 432 558 460"/>
    <line class="mark" x1="272" y1="318" x2="272" y2="446"/>
    <line class="mark" x1="314" y1="318" x2="314" y2="446"/>
    <line class="guide" x1="278" y1="314" x2="308" y2="314"/>
    <text class="tiny" x="322" y="319">φ：外移相，决定功率方向与大小</text>
    <text class="tiny" x="174" y="516">SPS 只有一个自由度，控制简单，但宽电压比/轻载时环流优化能力有限。</text>
  </g>

  <g id="tps">
    <line class="axis" x1="752" y1="350" x2="1148" y2="350"/>
    <line class="axis" x1="752" y1="412" x2="1148" y2="412"/>
    <line class="axis" x1="752" y1="474" x2="1148" y2="474"/>
    <line class="tick" x1="816" y1="324" x2="816" y2="492"/>
    <line class="tick" x1="900" y1="324" x2="900" y2="492"/>
    <line class="tick" x1="984" y1="324" x2="984" y2="492"/>
    <line class="tick" x1="1068" y1="324" x2="1068" y2="492"/>
    <text class="title2" x="674" y="356">v11</text>
    <text class="title2" x="674" y="418">v22</text>
    <text class="title2" x="674" y="480">iL</text>
    <path class="outline" d="M760 324 H858 V376 H956 V324 H1054 V376 H1144"/>
    <path class="primary" d="M760 376 H816 V324 H914 V376 H998 V324 H1096 V376 H1144"/>
    <path class="outline" d="M760 438 H900 V386 H998 V438 H1096 V386 H1144"/>
    <path class="secondary" d="M760 438 H858 V386 H942 V438 H1026 V386 H1110 V438 H1144"/>
    <path class="current" d="M760 474 C812 438 860 430 914 474 S1026 518 1080 474 S1120 444 1144 456"/>
    <line class="mark" x1="816" y1="318" x2="816" y2="386"/>
    <line class="mark" x1="858" y1="318" x2="858" y2="386"/>
    <line class="guide-rose" x1="822" y1="314" x2="852" y2="314"/>
    <text class="tiny" x="864" y="319">D1：左桥等效脉宽</text>
    <line class="mark" x1="858" y1="386" x2="858" y2="452"/>
    <line class="mark" x1="900" y1="386" x2="900" y2="452"/>
    <line class="guide-rose" x1="864" y1="455" x2="894" y2="455"/>
    <text class="tiny" x="906" y="460">D2：右桥等效脉宽</text>
    <line class="mark" x1="914" y1="318" x2="914" y2="452"/>
    <line class="mark" x1="942" y1="318" x2="942" y2="452"/>
    <line class="guide" x1="920" y1="306" x2="936" y2="306"/>
    <text class="tiny" x="948" y="311">φ：桥间外移相</text>
    <text class="tiny" x="760" y="516">TPS 用 φ、D1、D2 三个自由度塑造功率传输、电流应力与软开关范围。</text>
  </g>

  <rect class="soft" x="62" y="570" width="1116" height="98" rx="18"/>
  <text class="label" x="88" y="610">几种调制方式的自由度关系</text>
  <rect class="tag" x="88" y="630" width="198" height="34" rx="17"/>
  <text class="tiny" x="108" y="652">SPS：只调 φ</text>
  <rect class="tag2" x="306" y="630" width="244" height="34" rx="17"/>
  <text class="tiny" x="326" y="652">EPS：φ + 单侧内移相</text>
  <rect class="tag2" x="570" y="630" width="260" height="34" rx="17"/>
  <text class="tiny" x="590" y="652">DPS：φ + 两侧相同内移相</text>
  <rect class="tag" x="850" y="630" width="278" height="34" rx="17"/>
  <text class="tiny" x="870" y="652">TPS：φ + D1 + D2 独立调节</text>

  <text class="small" x="62" y="728">注：SR-DAB 中谐振电流由 v11、折算后的 v22、谐振腔参数与频率共同决定；图中电流只表达“相移改变电压差，从而改变电流”的直观趋势。</text>
</svg>
